name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.Health_Sphere }}
        run: |
          # 1. Delete the frontend folder so it's gone from the physical disk
          rm -rf Health_Sphere/
          
          # 2. Delete the .git folder so we lose the history of the binary files
          rm -rf .git
          
          # 3. Initialize a BRAND NEW git repo with NO history
          git init
          git checkout -b main
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # 4. Add only the remaining files (Backend, app.py, requirements.txt, README.md)
          git add .
          git commit -m "Clean deploy: Backend only"
          
          # 5. Force push this "fresh" history to Hugging Face
          git remote add hf https://x-token-auth:$HF_TOKEN@huggingface.co/spaces/manikadahal/Health_Sphere
          git push -f hf main
